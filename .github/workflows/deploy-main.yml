name: Server Deploy Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: server-production-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JAR
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: seodongbe/hackathon-daker:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if docker-compose.prod.yml changed
        id: compose-changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'docker-compose.prod.yml'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync docker-compose.prod.yml to server
        if: steps.compose-changed.outputs.changed == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: docker-compose.prod.yml
          target: ~/daker/

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd ~/daker
            docker pull seodongbe/hackathon-daker:latest
            DOCKERHUB_USERNAME=seodongbe docker-compose -f docker-compose.prod.yml up -d --no-build app

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            echo "Health check attempt $i/12..."
            if curl --fail --silent --show-error --max-time 10 "http://${{ secrets.EC2_HOST }}:8080/stats"; then
              echo "Server is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "Server failed to start after 2 minutes"
          exit 1
