name: Server Deploy Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: server-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          BUILD_COMMAND: ${{ secrets.SERVER_BUILD_COMMAND }}
          STOP_COMMAND: ${{ secrets.SERVER_STOP_COMMAND }}
          START_COMMAND: ${{ secrets.SERVER_START_COMMAND }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: APP_DIR,BUILD_COMMAND,STOP_COMMAND,START_COMMAND
          script_stop: true
          script: |
            set -e
            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git pull origin main

            if [ -n "$BUILD_COMMAND" ]; then
              bash -lc "$BUILD_COMMAND"
            else
              chmod +x gradlew
              ./gradlew clean build -x test
            fi

            if [ -n "$STOP_COMMAND" ]; then
              bash -lc "$STOP_COMMAND"
            fi

            if [ -n "$START_COMMAND" ]; then
              bash -lc "$START_COMMAND"
            fi

      - name: Health check
        if: ${{ secrets.SERVER_HEALTHCHECK_URL != '' }}
        run: |
          curl --fail --silent --show-error --max-time 10 "${{ secrets.SERVER_HEALTHCHECK_URL }}"
